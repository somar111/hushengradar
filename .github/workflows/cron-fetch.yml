name: Cron Fetch Reviews

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）跑一次增量抓取+分类+翻译
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # 用 install 不用 ci：npm ci 对 optional peer dependency 的校验在不同 npm 版本间不一致，
      # 本地 npm 生成的 lock 文件在 CI 的 npm 版本下会被判定"不同步"，install 会自动协调，不死板校验
      - run: npm install
      - run: node scripts/cron-fetch.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
